services:
  - type: web
    name: caremate-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: CLIENT_URL
        sync: false
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: AI_SERVICE_URL
        sync: false
      - key: AI_SERVICE_TIMEOUT
        value: "30000"
      - key: ENABLE_AI_FEATURES
        value: "true"
      - key: ENABLE_EMAIL_NOTIFICATIONS
        value: "false"
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: AUTH_RATE_LIMIT_MAX_REQUESTS
        value: "5"
